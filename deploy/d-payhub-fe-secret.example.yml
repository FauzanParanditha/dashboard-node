# TEMPLATE ONLY — do NOT commit real secret values.
#
# Runtime secrets for the payment-aggregator frontend (next start / Node server).
# These are read server-side via process.env at RUNTIME (API routes such as
# /api/encrypt and /api/payment, getServerSideProps). They must NOT be inlined
# into the client bundle.
#
# Build-time NEXT_PUBLIC_* values are intentionally absent here: Next inlines
# them during `docker build`, so they are provided by the CI build step
# (see .gitlab-ci.yml), not by this Secret.
#
# Apply the real values out-of-band, e.g.:
#   kubectl -n dev create secret generic d-payhub-fe-env \
#     --from-literal=ENCRYPTION_KEY='<rotated-64-hex>' \
#     --from-literal=HMAC_KEY='<rotated-64-hex>' \
#     --from-literal=PARTNER_ID='<value>' \
#     --from-literal=SERVER_API_URL='<value>' \
#     --from-file=PRIVATE_KEY=/path/to/private-key.pem
#
# IMPORTANT: the previous ENCRYPTION_KEY/HMAC_KEY were inlined into the shipped
# client bundle and must be considered compromised — generate fresh keys.
apiVersion: v1
kind: Secret
metadata:
  name: d-payhub-fe-env
  namespace: dev
  labels:
    app: d-payhub-fe
    env: dev
type: Opaque
stringData:
  # 32-byte keys as 64 hex chars (openssl rand -hex 32). ROTATE before use.
  ENCRYPTION_KEY: "REPLACE_ME_64_HEX"
  HMAC_KEY: "REPLACE_ME_64_HEX"
  PARTNER_ID: "REPLACE_ME"
  SERVER_API_URL: "REPLACE_ME"
  # PEM block; keep the newlines (use a block scalar).
  PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME
    -----END PRIVATE KEY-----
