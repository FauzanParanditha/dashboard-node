# TEMPLATE ONLY — do NOT commit real secret values.
#
# Runtime secrets for the payment-aggregator frontend (next start / Node server).
# Only the values read server-side via process.env AT RUNTIME belong here:
#   - ENCRYPTION_KEY / HMAC_KEY  -> used by /api/encrypt and /api/payment.
# They MUST be identical to the backend's ENCRYPTION_KEY/HMAC_KEY so payment
# links can be encrypted on one side and decrypted on the other.
#
# Intentionally NOT here:
#   - NEXT_PUBLIC_* and SERVER_API_URL -> build-time, injected by CI during
#     `docker build` (see .gitlab-ci.yml), not at runtime.
#   - PARTNER_ID -> only appears in a documentation code sample, never executed.
#   - PRIVATE_KEY -> currently unused (commented out in utils/paylabs.ts).
#
# Apply the real values out-of-band, e.g.:
#   kubectl -n dev create secret generic d-payhub-fe-env \
#     --from-literal=ENCRYPTION_KEY='<rotated-64-hex>' \
#     --from-literal=HMAC_KEY='<rotated-64-hex>'
#
# IMPORTANT: the previous ENCRYPTION_KEY/HMAC_KEY were inlined into the shipped
# client bundle and must be considered compromised — generate fresh keys with
# `openssl rand -hex 32` (64 hex chars each).
apiVersion: v1
kind: Secret
metadata:
  name: d-payhub-fe-env
  namespace: dev
  labels:
    app: d-payhub-fe
    env: dev
type: Opaque
stringData:
  # 32-byte keys as 64 hex chars (openssl rand -hex 32). Must match the backend.
  ENCRYPTION_KEY: "REPLACE_ME_64_HEX"
  HMAC_KEY: "REPLACE_ME_64_HEX"
