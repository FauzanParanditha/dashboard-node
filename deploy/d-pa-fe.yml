kind: Deployment
apiVersion: apps/v1
metadata:
  name: d-payhub-fe
  namespace: dev
  labels:
    app: proxy-payhub-fe
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: d-payhub-fe
      env: dev
  template:
    metadata:
      labels:
        app: d-payhub-fe
        env: dev
    spec:
      containers:
        - name: d-payhub-fe
          image: 'images.247.or.id/pandi/payment-aggregator-frontend:latest'
          # Runtime secrets (server-side process.env): ENCRYPTION_KEY, HMAC_KEY,
          # PRIVATE_KEY, PARTNER_ID, SERVER_API_URL. Required since encryption
          # moved server-side — without these, /api/encrypt and /api/payment
          # fail at startup. See deploy/d-payhub-fe-secret.example.yml.
          envFrom:
            - secretRef:
                name: d-payhub-fe-env
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
        #  volumeMounts:
     #       - name: d-payhubndimeeting-frontendenv
      #        mountPath: /usr/share/nginx/html/.env
       #       subPath: .env
          imagePullPolicy: Always
      restartPolicy: Always
      imagePullSecrets:
        - name: secret-dev